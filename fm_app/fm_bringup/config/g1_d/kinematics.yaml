# Kinematics for the G1-D arm groups.
#
# KDL plugin. Each arm is 7-DOF, so full 6-DOF pose IK is well-posed. MoveIt Servo
# jogs through the robot model's Jacobian and does not rely on this solver for teleop;
# the entries are here so the planning scene + any future MoveGroup use resolve.
right_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005

left_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005
