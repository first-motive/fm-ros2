# Linux (native) overlay — GPU, device passthrough, X11. Full hardware path.
services:
  fm_ros2:
    ports:
      - "8765:8765"   # foxglove_bridge
    # NVIDIA GPU access (requires nvidia-container-toolkit on the host).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Robot hardware + GUI passthrough.
    devices:
      - /dev:/dev
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
    volumes:
      - ../:/ws:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
