# macOS (M5) overlay — OrbStack. No GPU, no /dev passthrough, no hardware.
# Dev + build + sim + dataset only. Foxglove port published to the host so
# Foxglove Studio on macOS can connect to ws://localhost:8765.
services:
  fm_ros2:
    platform: linux/arm64
    ports:
      - "8765:8765"   # foxglove_bridge -> macOS Foxglove Studio
    environment:
      - ROS_DOMAIN_ID=0
