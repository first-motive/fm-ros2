# Native ROS2 Humble environment via pixi + RoboStack.
# Recommended path on macOS (osx-arm64) and Windows (win-64); linux-64 is
# declared for lockfile parity but day-to-day Linux still runs the container.
# RoboStack ships prebuilt Humble binaries on the robostack-humble channel;
# rosdep is unsupported inside pixi — add ROS deps with `pixi add ros-humble-<pkg>`.
[workspace]
name = "fm_ros2"
version = "0.1.0"
channels = ["robostack-humble", "conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

[dependencies]
ros-humble-desktop = "*"
colcon-common-extensions = "*"
# ROS2 Humble packages target CMake 3.x; CMake 4 removed pre-3.5 compatibility and
# breaks rosidl_generator_py's FindPython. Pin below 4 so interface packages build.
cmake = "<4"
# The DDS IDL generator is not pulled in by ros-humble-desktop, but the unitree_api
# external needs it to build. rosdep is unsupported in pixi, so add it explicitly.
ros-humble-rosidl-generator-dds-idl = "*"
# MoveIt is not part of ros-humble-desktop, but fm_control and fm_teleop need it
# (moveit_servo drives teleop). The metapackage lacks servo, so add both.
ros-humble-moveit = ">=2.5.9,<3"
ros-humble-moveit-servo = ">=2.5.9,<3"
ros-humble-joint-state-publisher = ">=2.4.0,<3"
ros-humble-ros2-control = ">=2.51.0,<3"
ros-humble-ros2-controllers = ">=2.48.0,<3"
ros-humble-joint-state-publisher-gui = ">=2.4.0,<3"
libmujoco = ">=3.10.0,<4"
glfw = ">=3.4,<4"
ros-humble-ros2-control-cmake = ">=0.2.1,<0.3"
ros-humble-backward-ros = ">=1.0.8,<2"
ros-humble-control-toolbox = ">=3.6.1,<4"
ros-humble-realtime-tools = ">=2.14.0,<3"
ros-humble-transmission-interface = ">=2.51.0,<3"
ros-humble-tinyxml2-vendor = ">=0.7.6,<0.8"
lodepng = ">=20220109,<20220110"
trimesh = ">=4.12.2,<5"
pycollada = ">=0.9.3,<0.10"

# foxglove-bridge and spacenav have no win-64 build on robostack-humble, so both
# are scoped to the platforms that have them. Native Windows therefore has no
# foxglove path (installs default to the rviz viewer — see docs) and no
# SpaceMouse teleop source.
[target.osx-arm64.dependencies]
ros-humble-foxglove-bridge = "*"
ros-humble-spacenav = ">=3.3.0,<4"
# Wrist-camera capture republishes raw frames to compressed for recording. The
# compressed transport plugin is not part of ros-humble-desktop, so add it (rosdep
# is unsupported in pixi). Scoped to the platforms with a camera driver (osx-arm64
# builds opencv_cam, linux-64 has usb_cam); win-64 has no camera path. See
# docs/SETUP.md wrist-camera note.
ros-humble-image-transport-plugins = "*"
# opencv_cam build dep, not shipped by ros-humble-desktop. osx-arm64 only: it is the
# one platform that builds opencv_cam from source (Linux uses the usb_cam binary and
# COLCON_IGNOREs opencv_cam).
ros-humble-camera-calibration-parsers = "*"

[target.linux-64.dependencies]
ros-humble-foxglove-bridge = "*"
ros-humble-spacenav = ">=3.3.0,<4"
ros-humble-image-transport-plugins = "*"

# Build the full colcon workspace (src/ + external/) from the host via
# scripts/run/native-build.sh, which points CMake's FindPython at the env interpreter
# (rosidl_generator_py cannot otherwise locate the conda Python's dev component on
# osx-arm64, and the failure aborts the whole build) and, on macOS, heals the
# controller_manager bug + adds -dead_strip_dylibs (see that script). PYTHONWARNINGS
# silences setuptools' per-package "Unknown distribution option: 'tests_require'"
# spam (same pattern install.sh uses for the pkg_resources warning) until the
# package repos drop the deprecated tests_require from their setup.py.
[tasks.build]
cmd = "bash scripts/run/native-build.sh"
env = { PYTHONWARNINGS = "ignore:Unknown distribution option:UserWarning" }

# Run the fm_ package tests natively.
[tasks.test]
cmd = "colcon test --packages-select $(colcon list --names-only | grep '^fm_')"
depends-on = ["build"]

# Python runtime deps that colcon does not install (fm_tui's setup.py install_requires
# plus mujoco for the sim). The container installs these via the image Dockerfile; on
# the native path pixi is the package manager, so they live here. fm-tools is pinned
# to the same SHA fm_tui declares.
[pypi-dependencies]
textual = "==0.74.0"
rich = ">=15.0.0, <16"
fm-tools = { git = "https://github.com/first-motive/fm-tools", rev = "5d9ef62f9449321730b8ebcacef7be3bc13448f5" }
mujoco = ">=3.10.0, <4"
mediapipe = "==0.10.14"
