# Native ROS2 Humble environment via pixi + RoboStack.
# Recommended path on macOS (osx-arm64) and Windows (win-64); linux-64 is
# declared for lockfile parity but day-to-day Linux still runs the container.
# RoboStack ships prebuilt Humble binaries on the robostack-humble channel;
# rosdep is unsupported inside pixi — add ROS deps with `pixi add ros-humble-<pkg>`.
[workspace]
name = "fm_ros2"
version = "0.1.0"
channels = ["robostack-humble", "conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

[dependencies]
ros-humble-desktop = "*"
colcon-common-extensions = "*"
# ROS2 Humble packages target CMake 3.x; CMake 4 removed pre-3.5 compatibility and
# breaks rosidl_generator_py's FindPython. Pin below 4 so interface packages build.
cmake = "<4"
# The DDS IDL generator is not pulled in by ros-humble-desktop, but the unitree_api
# external needs it to build. rosdep is unsupported in pixi, so add it explicitly.
ros-humble-rosidl-generator-dds-idl = "*"
# MoveIt is not part of ros-humble-desktop, but fm_control and fm_teleop need it
# (moveit_servo drives teleop). The metapackage lacks servo, so add both.
ros-humble-moveit = ">=2.5.9,<3"
ros-humble-moveit-servo = ">=2.5.9,<3"

# foxglove-bridge is not built for win-64 on robostack-humble, so it is scoped to
# the platforms that have it. Native Windows therefore has no foxglove path from
# RoboStack — Windows installs default to the rviz viewer (see docs).
[target.osx-arm64.dependencies]
ros-humble-foxglove-bridge = "*"

[target.linux-64.dependencies]
ros-humble-foxglove-bridge = "*"

[tasks]
# Build the full colcon workspace (src/ + external/) from the host. Point CMake's
# FindPython at the env interpreter — rosidl_generator_py (used by unitree_api and
# other interface packages) cannot otherwise locate the conda Python's dev
# component on osx-arm64, and the failure aborts the whole build.
build = "colcon build --symlink-install --cmake-args -DPython_EXECUTABLE=$CONDA_PREFIX/bin/python -DPython3_EXECUTABLE=$CONDA_PREFIX/bin/python"
# Run the fm_ package tests natively.
test = { cmd = "colcon test --packages-select $(colcon list --names-only | grep '^fm_')", depends-on = ["build"] }
