# MoveIt Servo for the G1-D right_arm group — full 6-DOF Cartesian + joint jogging.
#
# Servo subscribes /joint_states from the sim, turns incoming TwistStamped / JointJog
# commands into a streamed JointTrajectory, and publishes it to the arm's JTC. Teleop
# inputs (Foxglove panel, joy, spacenav) publish onto the delta command topics below.
#
# The right arm is 7-DOF, so it spans SE(3): arbitrary 6-DOF Cartesian twists are
# reachable (no reduced-DOF caveat). In sim this drives the JTC; on real hardware the
# Servo->arm_sdk bridge consumes the same JointTrajectory instead (see the bridge).
moveit_servo:
  use_gazebo: false
  command_in_type: unitless  # [-1, 1] for joystick-style inputs

  scale:
    linear: 0.4       # m/s at unit command
    rotational: 0.8   # rad/s at unit command
    joint: 0.5        # rad/s at unit command

  low_latency_mode: false
  publish_period: 0.034  # ~30 Hz command stream

  # Stream a JointTrajectory to the right arm's joint_trajectory_controller.
  command_out_type: trajectory_msgs/JointTrajectory
  publish_joint_positions: true
  publish_joint_velocities: false
  publish_joint_accelerations: false

  move_group_name: right_arm
  planning_frame: torso_link
  ee_frame_name: right_wrist_yaw_link
  robot_link_command_frame: torso_link

  incoming_command_timeout: 0.1
  joint_topic: /joint_states
  status_topic: ~/status
  cartesian_command_in_topic: ~/delta_twist_cmds
  joint_command_in_topic: ~/delta_joint_cmds
  command_out_topic: /g1_right_arm_controller/joint_trajectory

  # Collision checking is OFF for the G1-D. Servo monitors the WHOLE model (34 joints),
  # but only the right arm is controlled; the static body — including the multi-link
  # right hand — sits in constant self-contact at its default pose (adjacent finger
  # segments touch), which floods Servo with collision warnings that no arm motion can
  # clear. A full SRDF collision matrix (MoveIt setup-assistant scale) is out of scope;
  # the arm jogs in free space, and the real arm runs through the arm_sdk bridge, not
  # this collision-checked path. Singularity slowdown below still applies.
  check_collisions: false
  collision_check_rate: 10.0
  self_collision_proximity_threshold: 0.01
  scene_collision_proximity_threshold: 0.02
  collision_distance_safety_factor: 1000.0
  min_allowable_collision_distance: 0.01

  lower_singularity_threshold: 17.0
  hard_stop_singularity_threshold: 30.0
  leaving_singularity_threshold_multiplier: 2.0

  joint_limit_margin: 0.1
