# OpenArm controllers for the right_arm preset (single arm, no gripper).
#
# Identical structure across every sim backend — only the <ros2_control> System
# plugin in the description swaps. For mujoco/gazebo/isaac the sim process hosts the
# controller_manager and reads these params; for mock/real a standalone
# ros2_control_node does. Joint names match openarm_description geometry:
# openarm_right_joint1..7.
controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Primary MoveIt Servo target: streams trajectory_msgs/JointTrajectory.
    openarm_right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Alternative Servo target: std_msgs/Float64MultiArray straight to position.
    # Loaded inactive; switch to it when Servo runs in forward-command mode.
    openarm_right_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

openarm_right_arm_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

openarm_right_forward_position_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    interface_name: position
