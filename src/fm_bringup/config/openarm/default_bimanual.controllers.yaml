# OpenArm controllers for the default_bimanual preset (left + right arm, each with a
# pinch gripper). Same structure as right_arm, one controller set per arm. Joint
# names match openarm_description geometry: openarm_left_* and openarm_right_*.
controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    openarm_left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    openarm_right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    openarm_left_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    openarm_right_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

openarm_left_arm_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

openarm_right_arm_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

openarm_left_gripper_controller:
  ros__parameters:
    joints:
      - openarm_left_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position

openarm_right_gripper_controller:
  ros__parameters:
    joints:
      - openarm_right_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
