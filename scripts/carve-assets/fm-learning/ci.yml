name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore"]

# Standalone build (hybrid CI): fm-learning is an ament_cmake metapackage — it
# builds nothing and only exec-depends on the fm-data + fm-policy repos, so it
# builds on its own without cloning those (private) siblings. The assembled
# learning build lives in fm-ros2.
jobs:
  build-test:
    name: build (humble)
    runs-on: ubuntu-latest
    container: ros:humble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/fm-learning

      - name: Install ROS deps
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths src --ignore-src -y -r || true

      - name: colcon build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install
