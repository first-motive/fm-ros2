name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  colcon-build-test:
    name: colcon build + test (humble)
    runs-on: ubuntu-latest
    # Run directly in the ROS Humble image — same base our Dockerfile extends.
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-pytest \
            python3-pip
          rm -rf /var/lib/apt/lists/*
          # fm_tui runtime dep; colcon build does not install pip requirements.
          pip3 install textual==0.74.0

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: colcon test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          # colcon test alone exits 0 even on test failures; run it without the
          # return-code flag so the next step always prints the verbose result,
          # then let colcon test-result set the non-zero exit. This surfaces the
          # failing test's output instead of dying before it prints.
          colcon test
          colcon test-result --verbose
