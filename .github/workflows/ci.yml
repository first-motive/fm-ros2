name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  workspace:
    name: build + test + smoke (humble)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the First Motive base image so CI carries the exact same deps the
      # workspace needs (moveit, ros2_control, the sim backends, rosidl_generator_dds_idl
      # for the vendored Unitree messages). One source of truth: docker/Dockerfile.base.
      - name: Build base image
        run: docker build -t fm-ros2:ci -f docker/Dockerfile.base .

      # src/external is gitignored, so CI must vendor the sources the build consumes
      # (openarm_description, the unitree_hg messages, ...) at their pinned commits.
      - name: Import externals
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc './scripts/import-externals.sh'

      - name: colcon build
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc 'source /opt/ros/humble/setup.bash && colcon build --symlink-install'

      # Test the First Motive packages only — the vendored externals (openarm_*,
      # unitree_*) carry their own test suites, which are not ours to keep green.
      # colcon test alone exits 0 even on failures; run it, then let colcon test-result
      # surface the failing output and set the non-zero exit.
      - name: colcon test
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc 'source /opt/ros/humble/setup.bash && source install/setup.bash &&
                      fm_pkgs=$(colcon list --names-only | grep "^fm_") &&
                      colcon test --packages-select $fm_pkgs &&
                      colcon test-result --verbose'

      # Headless robot asserts: per-robot mock controllers, the G1 arm_sdk bridge, the
      # G1 base AGV command. The mujoco-render, Linux/GPU, and real-hardware items of
      # the test plan stay manual.
      - name: Smoke (three-robot headless asserts)
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc './scripts/ci-smoke.sh'

  panel:
    name: foxglove teleop panel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Type-checks + bundles the TypeScript/React teleop panel (not part of the ROS
      # workspace). Catches panel breakage — a broken ROBOTS entry, a type error.
      - name: Build panel
        working-directory: foxglove_teleop
        run: |
          npm ci
          npm run build
