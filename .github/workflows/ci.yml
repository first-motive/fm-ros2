name: CI

# Skip CI when only docs / non-code change — the orchestrator build is expensive
# (base image + full assembled colcon build).
on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore", "plans/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".gitignore", "plans/**"]

jobs:
  selftest:
    name: bootstrap self-test (curl|bash FM_SELFTEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # install.sh and run.sh are curl|bash-able. Run each from an empty dir so it
      # takes its network branch — the piped path real users hit. FM_SELFTEST stops
      # each script after deps load and resolve, before any clone, import, OrbStack
      # install, container, or build. install.sh stops at arg parse (needs no auth);
      # run.sh fetches lib.sh from the pinned fm-tools tag, then stops.
      - name: install.sh + run.sh survive the piped curl path
        run: |
          set -euo pipefail
          repo="$PWD"
          cd "$(mktemp -d)"
          for s in install.sh run.sh; do
            echo "== $s =="
            out="$(cat "$repo/$s" | FM_SELFTEST=1 bash 2>&1)" \
              || { echo "$out"; echo "FAIL: $s exited non-zero under curl|bash"; exit 1; }
            echo "$out"
            echo "$out" | grep -q "selftest ok" \
              || { echo "FAIL: $s did not reach 'selftest ok'"; exit 1; }
          done
          echo "bootstrap self-test OK"

  workspace:
    name: build + test + smoke (humble)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      # fm-ros2 holds no package source — the seven package repos are private, so
      # mint a short-lived GitHub App token (fm-ros2-ci, Contents:read) and pull
      # them into src/ before building.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FM_CI_APP_ID }}
          private-key: ${{ secrets.FM_CI_APP_KEY }}
          owner: first-motive

      - name: Import package repos
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf \
            "https://github.com/"
          # Clone the package repos straight from the manifest URLs — no vcstool,
          # so CI carries no extra Python deps.
          mkdir -p src
          while read -r url; do
            name="$(basename "$url" .git)"
            # fm-docker is shared container infra, not a colcon package — skip it.
            [ "$name" = "fm-docker" ] && continue
            echo "cloning $name"
            # Snake the local checkout dir (src/fm_robot) to match the package name;
            # the GitHub slug in $url stays kebab (fm-robot.git).
            git clone --depth 1 "$url" "src/${name//-/_}"
          done < <(grep -oE 'https://github.com/[^ ]+\.git' fm-ros2.repos)

      # fm-ros2 owns no image — pull the published fm-app full-stack image (the top
      # of the inheritance chain: fm-docker base -> fm-robot -> fm-app), which
      # carries the exact deps the assembled workspace needs (moveit, ros2_control,
      # the sim backends, rosidl_generator_dds_idl for the vendored Unitree
      # messages). Tag it fm-ros2:ci so the build/test steps below are unchanged.
      # The fm-app GHCR package is private, so log in with the App token (the
      # fm-ros2-ci app needs packages:read on the first-motive org).
      - name: Pull launcher image
        run: |
          echo "${{ steps.app-token.outputs.token }}" | \
            docker login ghcr.io -u x-access-token --password-stdin
          docker pull ghcr.io/first-motive/fm-app:humble
          docker tag ghcr.io/first-motive/fm-app:humble fm-ros2:ci

      # external is gitignored, so CI must vendor the sources the build consumes
      # (openarm_description, the unitree_hg messages, ...) at their pinned commits.
      - name: Import externals
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc './scripts/install/import-externals.sh'

      - name: colcon build
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc 'source /opt/ros/humble/setup.bash && colcon build --symlink-install'

      # Test the First Motive packages only — the vendored externals (openarm_*,
      # unitree_*) carry their own test suites, which are not ours to keep green.
      # colcon test alone exits 0 even on failures; run it, then let colcon test-result
      # surface the failing output and set the non-zero exit.
      - name: colcon test
        run: |
          docker run --rm -v "${{ github.workspace }}:/ws" -w /ws fm-ros2:ci \
            bash -lc 'source /opt/ros/humble/setup.bash && source install/setup.bash &&
                      fm_pkgs=$(colcon list --names-only | grep "^fm_") &&
                      colcon test --packages-select $fm_pkgs &&
                      colcon test-result --verbose'

      # The headless three-robot smoke asserts (scripts/ci/ci-smoke.sh) are run
      # manually / locally for now — a ros2 launch in the assembled workspace can
      # hang teardown in CI. Tracked as a follow-up; build + test above is the
      # integration gate.

  macos:
    name: native sim core (macos arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # The native sim-core smoke runs the fm_sim sources, which live in the fm-sim
      # repo — check it out into src/fm_sim (where ci-smoke-macos.sh expects it).
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FM_CI_APP_ID }}
          private-key: ${{ secrets.FM_CI_APP_KEY }}
          owner: first-motive

      - uses: actions/checkout@v7
        with:
          repository: first-motive/fm-sim
          token: ${{ steps.app-token.outputs.token }}
          path: src/fm_sim

      - uses: astral-sh/setup-uv@v7

      # Install the pixi binary (no full env solve — run-install: false) so the
      # smoke's pixi block runs on the runner instead of skipping: it checks the
      # lockfile is consistent with pixi.toml and covers all three platforms. The
      # heavy full-env materialization is deferred; the lock check validates the
      # native env solves from one manifest.
      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          run-install: false

      # The M5 daily driver runs the full stack in a Linux container (OrbStack),
      # which GitHub's macOS runners cannot host. This job covers the ROS-free
      # pieces the M5 runs natively on arm64 CPU — the MuJoCo stepper and the MJCF
      # registry — plus a real native mujoco wheel step — and now the native
      # install/run dispatch (flags, profile routing) and the pixi lock check. uv
      # provisions Python + deps; no Docker, no ROS2. Same script runs locally:
      # ./scripts/ci/ci-smoke-macos.sh
      - name: Host-native sim core smoke
        run: ./scripts/ci/ci-smoke-macos.sh

  installer:
    name: installer import path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # install.sh installs vcstool via uv on a bare host, then drives the imports.
      - uses: astral-sh/setup-uv@v7

      # The package repos install.sh imports are private — mint the same short-lived
      # App token the workspace job uses so the clone is authenticated.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FM_CI_APP_ID }}
          private-key: ${{ secrets.FM_CI_APP_KEY }}
          owner: first-motive

      # Run the installer: setup only (clone + import + viewer), no docker build or
      # run — that is run.sh's job. install-foxglove self-skips off macOS, so this
      # runs clean on Linux. Rewrite github.com to carry the App token so the vcs
      # import over HTTPS authenticates, then assert src/ came out populated.
      - name: Run installer
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf \
            "https://github.com/"
          # Provision from an empty dir — the real curl|bash path. Running from the
          # repo root collides the fm_ros2 clone target with the fm_ros2/ workspace
          # metapackage already checked out there.
          workdir="$(mktemp -d)"
          cd "$workdir"
          bash "$GITHUB_WORKSPACE/install.sh"
          for pkg in fm_robot fm_sim fm_teleop fm_app; do
            test -d "fm_ros2/src/$pkg" || { echo "missing src/$pkg"; exit 1; }
          done
          echo "src/ populated — installer import path green"

  panel:
    name: foxglove teleop panel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The teleop panel lives in the fm-teleop repo — check it out to build it.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FM_CI_APP_ID }}
          private-key: ${{ secrets.FM_CI_APP_KEY }}
          owner: first-motive

      - uses: actions/checkout@v7
        with:
          repository: first-motive/fm-teleop
          token: ${{ steps.app-token.outputs.token }}
          path: src/fm_teleop

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Type-checks + bundles the TypeScript/React teleop panel (not part of the ROS
      # workspace). Catches panel breakage — a broken ROBOTS entry, a type error.
      - name: Build panel
        working-directory: src/fm_teleop/fm_teleop_panel
        run: |
          npm ci
          npm run build
